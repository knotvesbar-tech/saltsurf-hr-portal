function buildPageHTML(role, lang) {
  const L = CONTENT.labels[lang];
  const R = CONTENT.roles[role][lang];
  const menus = CONTENT.menus[role];
  const instructions = CONTENT.instructions[role];
  const fontClass = lang === 'th' ? 'thai' : lang === 'my' ? 'myanmar' : 'english';

  // Cover page
  let html = `<div class="page ${fontClass} cover">
    <div class="logo">SALT<br>SURF</div>
    <h1>${L.saltsurf}</h1>
    <h2>${L.hrPortal}</h2>
    <div style="width:60px; height:3px; background:#FF6C37; margin: 15px auto;"></div>
    <p style="font-size:18px; color:#003764; font-weight:600; margin-top:20px;">${L.guideFor}</p>
    <p style="font-size:22px; color:#FF6C37; font-weight:700;">${R.title}</p>
    <p class="subtitle">${L.version}</p>
    <p class="url">${L.url}</p>
  </div>`;

  // Content page(s)
  html += `<div class="page ${fontClass}">`;

  // Login section
  html += `<h3>${L.login}</h3>`;
  html += `<div class="credential-box">
    <strong>${L.yourCredentials}:</strong><br>
    ${L.username}: <code>${R.loginUser}</code> &nbsp; ${L.password}: <code>${R.loginPass}</code>
  </div>`;
  const loginSteps = ['loginStep1', 'loginStep2', 'loginStep3', 'loginStep4'];
  loginSteps.forEach((s, i) => {
    html += `<div class="step"><div class="step-num">${i+1}</div><div class="step-text">${L[s]}</div></div>`;
  });

  // Menu overview
  html += `<h3>${L.menuOverview}</h3>`;
  menus.forEach(m => {
    const name = L[m] || m;
    const desc = L[m + 'Desc'] || '';
    html += `<div class="menu-item"><div class="name">${name}</div><div class="desc">${desc}</div></div>`;
  });

  // Language switch tip
  html += `<h3>${L.changeLang}</h3>`;
  html += `<div class="note">${L.changeLangDesc}</div>`;

  html += `<div class="footer">${L.pageFooter}</div></div>`;

  // Instructions page
  html += `<div class="page ${fontClass}">`;
  html += `<h3>${L.features}</h3>`;

  instructions.forEach(instr => {
    html += `<h4>${L[instr]}</h4>`;
    const steps = CONTENT.steps[instr];
    steps.forEach((s, i) => {
      html += `<div class="step"><div class="step-num">${i+1}</div><div class="step-text">${L[s]}</div></div>`;
    });
  });

  // Role-specific notes
  if (role === 'admin') {
    html += `<h3>${L.importantNotes}</h3><div class="note">${L.noteAdmin}</div>`;
  } else if (role === 'depthead') {
    html += `<h3>${L.importantNotes}</h3><div class="note">${L.noteDepthead}</div>`;
  }

  // Language switch reminder
  html += `<div class="note" style="margin-top:20px;">${L.langSwitch}</div>`;
  html += `<div class="footer">${L.pageFooter}</div></div>`;

  return html;
}

async function generatePDF(role, lang) {
  const renderArea = document.getElementById('render-area');
  renderArea.innerHTML = buildPageHTML(role, lang);

  // Wait for fonts to render
  await new Promise(r => setTimeout(r, 500));

  const pages = renderArea.querySelectorAll('.page');
  const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

  for (let i = 0; i < pages.length; i++) {
    if (i > 0) pdf.addPage();
    const canvas = await html2canvas(pages[i], {
      scale: 2,
      useCORS: true,
      backgroundColor: '#ffffff',
      width: 794,
      windowWidth: 794
    });
    const imgData = canvas.toDataURL('image/jpeg', 0.95);
    pdf.addImage(imgData, 'JPEG', 0, 0, 210, 297);
  }

  const langLabel = { en: 'EN', th: 'TH', my: 'MY' }[lang];
  const roleLabel = { md: 'MD', hr: 'HR', depthead: 'DeptHead', employee: 'Employee', admin: 'Admin' }[role];
  const filename = `SaltSurf_HR_Guide_${roleLabel}_${langLabel}.pdf`;

  pdf.save(filename);
  return filename;
}

async function generateCombinedPDF(role) {
  const langs = ['en', 'th', 'my'];
  const renderArea = document.getElementById('render-area');
  const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  let firstPage = true;

  for (const lang of langs) {
    renderArea.innerHTML = buildPageHTML(role, lang);
    await new Promise(r => setTimeout(r, 500));

    const pages = renderArea.querySelectorAll('.page');
    for (let i = 0; i < pages.length; i++) {
      if (!firstPage) pdf.addPage();
      firstPage = false;
      const canvas = await html2canvas(pages[i], {
        scale: 2,
        useCORS: true,
        backgroundColor: '#ffffff',
        width: 794,
        windowWidth: 794
      });
      const imgData = canvas.toDataURL('image/jpeg', 0.95);
      pdf.addImage(imgData, 'JPEG', 0, 0, 210, 297);
    }
  }

  const roleLabel = { md: 'MD', hr: 'HR', depthead: 'DeptHead', employee: 'Employee', admin: 'Admin' }[role];
  const filename = `SaltSurf_HR_Guide_${roleLabel}.pdf`;
  pdf.save(filename);
  return filename;
}

async function generateAll() {
  const roles = ['md', 'hr', 'depthead', 'employee', 'admin'];
  const progress = document.getElementById('progress');
  const links = document.getElementById('download-links');
  const total = roles.length;

  // Wait for fonts
  await document.fonts.ready;
  progress.textContent = 'Fonts loaded. Generating PDFs (all 3 languages per role)...';
  await new Promise(r => setTimeout(r, 1000));

  for (let i = 0; i < roles.length; i++) {
    const role = roles[i];
    const roleName = CONTENT.roles[role]['en'].title;
    progress.textContent = `Generating ${i+1}/${total}: ${roleName} (EN + TH + MY)...`;
    await new Promise(r => setTimeout(r, 200));

    try {
      const filename = await generateCombinedPDF(role);
      links.innerHTML += `<p style="color:green;">✓ ${filename} (English + Thai + Myanmar)</p>`;
    } catch(e) {
      links.innerHTML += `<p style="color:red;">✗ ${role}: ${e.message}</p>`;
    }
  }

  progress.textContent = `Done! Generated ${total} PDF files. Check your Downloads folder.`;
}

// Auto-start after brief delay
setTimeout(generateAll, 2000);
</script>
