      html += '<h3 style="margin-bottom:0;">\u{1F3E2} ' + t('backOfficeTeam') + '</h3>';
      if (isManager) {
        html += '<button class="btn btn-primary btn-small" onclick="openBackOfficeContactModal()">' + t('addBackOfficeContact') + '</button>';
      }
      html += '</div>';
      if (APP.backOfficeContacts.length === 0) {
        html += '<p style="color:#999; font-style:italic;">' + t('noData') + '</p>';
      } else {
        html += '<div style="overflow-x:auto;"><table>';
        html += '<tr><th>' + t('contactName') + '</th><th>' + t('contactRole') + '</th><th>' + t('contactLineId') + '</th><th>' + t('contactPhone') + '</th><th>' + t('contactEmail') + '</th><th>' + t('contactNotes') + '</th>';
        if (isManager) html += '<th>' + t('action') + '</th>';
        html += '</tr>';
        APP.backOfficeContacts.forEach(function(c) {
          html += '<tr>';
          html += '<td><strong>' + c.name + '</strong></td>';
          html += '<td>' + (c.role || '-') + '</td>';
          html += '<td>' + (c.lineId || '-') + '</td>';
          html += '<td>' + (c.phone || '-') + '</td>';
          html += '<td>' + (c.email || '-') + '</td>';
          html += '<td>' + (c.notes || '-') + '</td>';
          if (isManager) {
            html += '<td><button class="btn btn-secondary btn-small" onclick="editBackOfficeContact(\'' + c.id + '\')">' + t('edit') + '</button> <button class="btn btn-danger btn-small" onclick="deleteBackOfficeContact(\'' + c.id + '\')">' + t('delete') + '</button></td>';
          }
          html += '</tr>';
        });
        html += '</table></div>';
      }
      html += '</div>';

      content.innerHTML = html;
      filterContactsTable();
    }

    function filterContactsTable() {
      var search = (document.getElementById('contactSearch').value || '').trim().toLowerCase();
      var filtered = APP.employees.filter(function(emp) {
        if (!search) return true;
        var haystack = [emp.empId, emp.fingerprintId, emp.name, emp.nickname, emp.dept, emp.pos, emp.phone, emp.lineId].join(' ').toLowerCase();
        return haystack.indexOf(search) > -1;
      });
      var html = '<table>';
      html += '<tr><th></th><th>' + t('employeeId') + '</th><th>' + t('contactName') + '</th><th>' + t('nickname') + '</th><th>' + t('section') + '</th><th>' + t('position') + '</th><th>' + t('contactLineId') + '</th><th>' + t('contactPhone') + '</th><th>' + t('contactEmail') + '</th></tr>';
      filtered.forEach(function(emp) {
        var avatar = emp.photo ? '<img src="' + emp.photo + '" style="width:35px; height:35px; border-radius:50%; object-fit:cover;">' : '<div style="width:35px; height:35px; border-radius:50%; background:#003764; color:white; display:inline-flex; align-items:center; justify-content:center; font-size:14px; font-weight:700;">' + emp.name.charAt(0).toUpperCase() + '</div>';
        html += '<tr>';
        html += '<td>' + avatar + '</td>';
        html += '<td>' + (emp.empId || '-') + '</td>';
        html += '<td><strong>' + emp.name + '</strong></td>';
        html += '<td>' + (emp.nickname || '-') + '</td>';
        html += '<td>' + (emp.section || emp.dept || '-') + '</td>';
        html += '<td>' + (emp.pos || '-') + '</td>';
        html += '<td>' + (emp.lineId || '-') + '</td>';
        html += '<td>' + (emp.phone || '-') + '</td>';
        html += '<td>' + (emp.email || '-') + '</td>';
        html += '</tr>';
      });
      html += '</table>';
      html += '<div style="margin-top:8px; color:#666; font-size:13px;">' + filtered.length + ' / ' + APP.employees.length + '</div>';
      document.getElementById('contactsTableArea').innerHTML = html;
    }

    function openBackOfficeContactModal(editId) {
      var c = editId ? APP.backOfficeContacts.find(function(x) { return x.id === editId; }) : null;
      var html = '<div class="form-group"><label>' + t('contactName') + ' *</label><input type="text" id="boName" value="' + (c ? c.name : '') + '"></div>';
      html += '<div class="form-group"><label>' + t('contactRole') + '</label><input type="text" id="boRole" value="' + (c ? (c.role || '') : '') + '" placeholder="e.g. Accountant, Lawyer"></div>';
      html += '<div class="form-group"><label>' + t('contactLineId') + '</label><input type="text" id="boLineId" value="' + (c ? (c.lineId || '') : '') + '"></div>';
      html += '<div class="form-group"><label>' + t('contactPhone') + '</label><input type="text" id="boPhone" value="' + (c ? (c.phone || '') : '') + '"></div>';
      html += '<div class="form-group"><label>' + t('contactEmail') + '</label><input type="email" id="boEmail" value="' + (c ? (c.email || '') : '') + '"></div>';
      html += '<div class="form-group"><label>' + t('contactNotes') + '</label><textarea id="boNotes" rows="2">' + (c ? (c.notes || '') : '') + '</textarea></div>';
      html += '<div class="modal-footer">';
      html += '<button class="btn btn-secondary" onclick="closeModal()">' + t('cancel') + '</button>';
      html += '<button class="btn btn-primary" onclick="saveBackOfficeContact(\'' + (editId || '') + '\')">' + t('submit') + '</button>';
      html += '</div>';
      openModal(editId ? t('edit') + ' - ' + t('backOfficeTeam') : t('addBackOfficeContact'), html);
    }

    function saveBackOfficeContact(editId) {
      var name = document.getElementById('boName').value.trim();
      if (!name) { showToast('Please enter a name', 'error'); return; }
      var data = {
        name: name,
        role: document.getElementById('boRole').value.trim(),
        lineId: document.getElementById('boLineId').value.trim(),
        phone: document.getElementById('boPhone').value.trim(),
        email: document.getElementById('boEmail').value.trim(),
        notes: document.getElementById('boNotes').value.trim()
      };
      if (editId) {
        var existing = APP.backOfficeContacts.find(function(x) { return x.id === editId; });
        if (existing) {
          existing.name = data.name;
          existing.role = data.role;
          existing.lineId = data.lineId;
          existing.phone = data.phone;
          existing.email = data.email;
          existing.notes = data.notes;
        }
        addLog('contact_update', 'Back office contact updated: ' + name);
      } else {
        data.id = 'BO' + Date.now();
        APP.backOfficeContacts.push(data);
        addLog('contact_add', 'Back office contact added: ' + name);
      }
      showToast(editId ? 'Contact updated' : 'Contact added', 'success');
      closeModal();
      renderContacts();
    }

    function editBackOfficeContact(id) {
      openBackOfficeContactModal(id);
    }

    function deleteBackOfficeContact(id) {
      if (!confirm(t('confirmDelete'))) return;
      var idx = APP.backOfficeContacts.findIndex(function(x) { return x.id === id; });
      if (idx >= 0) {
        var name = APP.backOfficeContacts[idx].name;
        APP.backOfficeContacts.splice(idx, 1);
        addLog('contact_delete', 'Back office contact deleted: ' + name);
        showToast('Contact deleted', 'success');
        renderContacts();
      }
    }

    function addLog(action, detail) {
      APP.logs.push({ ts: new Date().toISOString(), user: APP.currentUser?.name || 'System', action, detail });
      // Enforce 30-day minimum retention — auto-purge logs older than 30 days
      var cutoff = new Date();
      cutoff.setDate(cutoff.getDate() - 30);
      var cutoffISO = cutoff.toISOString();
      APP.logs = APP.logs.filter(function(log) { return log.ts >= cutoffISO; });
    }

    function openModal(title, html) {
      const modal = document.getElementById('modal');
      modal.innerHTML = `<div class="modal-header"><h3>${title}</h3><button class="modal-close" onclick="closeModal()">\u2715</button></div><div class="modal-body">${html}</div>`;
      document.getElementById('modalOverlay').style.display = 'block';
      modal.style.display = 'block';
    }

    function closeModal() {
      document.getElementById('modalOverlay').style.display = 'none';
      var modal = document.getElementById('modal');
      modal.style.display = 'none';
      modal.innerHTML = '';
    }

    function showToast(msg, type) {
      const container = document.getElementById('toastContainer');
      const icon = type === 'success' ? '\u2705' : '\u26A0\uFE0F';
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `<span>${icon}</span> <span>${msg}</span>`;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    var currentPage = 'dashboard';

    function renderLoginPage() {
      var el;
      el = document.getElementById('loginSubtitle'); if (el) el.textContent = t('loginTitle');
      el = document.getElementById('labelUsername'); if (el) el.textContent = t('loginUsername');
      el = document.getElementById('labelPassword'); if (el) el.textContent = t('loginPassword');
      el = document.getElementById('loginBtn'); if (el) el.textContent = t('loginBtn');
      el = document.getElementById('noAccountText'); if (el) el.textContent = t('noAccount');
      el = document.getElementById('signupLinkText'); if (el) el.textContent = t('signupLink');
      el = document.getElementById('demoTitle'); if (el) el.textContent = t('demoTitle');
      el = document.getElementById('demoMD'); if (el) el.textContent = t('demoMD');
      el = document.getElementById('demoHR'); if (el) el.textContent = t('demoHR');
      el = document.getElementById('demoDeptHead'); if (el) el.textContent = t('demoDeptHead');
      el = document.getElementById('demoEmployee'); if (el) el.textContent = t('demoEmployee');
      el = document.getElementById('demoAdmin'); if (el) el.textContent = t('demoAdmin');
    }

    function setLanguage(lang, btn) {
      APP.lang = lang;
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      renderLoginPage();
      renderSignupPage();
      if (APP.currentUser) {
        var savedPage = currentPage || 'dashboard';
        document.querySelector('.user-name').textContent = APP.currentUser.name;
        document.querySelector('.user-role').textContent = (APP.currentUser.empId || '') + ' | ' + APP.currentUser.role;
        renderNavigation();
        navigateTo(savedPage);
      }
    }

    // Initialize on page load
    window.addEventListener('load', function() {
      initApp();
    });
  </script>
  <script>
    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('./sw.js').then(function(reg) {
          console.log('[PWA] Service Worker registered, scope:', reg.scope);
        }).catch(function(err) {
          console.log('[PWA] Service Worker registration failed:', err);
        });
      });
    }
  </script>
</body>
